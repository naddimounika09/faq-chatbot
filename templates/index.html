<!DOCTYPE html>
<html>
<head>
    <title>FAQ Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(120deg, #89f7fe, #66a6ff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 400px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }

        .header {
            background: #4a90e2;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
        }

        #chat-box {
            height: 350px;
            overflow-y: auto;
            padding: 10px;
        }

        .message {
            margin: 10px 0;
        }

        .user {
            text-align: right;
            color: blue;
        }

        .bot {
            text-align: left;
            color: green;
        }

        .input-area {
            display: flex;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px;
            background: #4a90e2;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #357ab8;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">FAQ Chatbot 🤖</div>

    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask a question...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
async function sendMessage() {
    let input = document.getElementById("userInput");
    let message = input.value;

    if (!message) return;

    document.getElementById("chat-box").innerHTML +=
        `<div class='message user'>You: ${message}</div>`;

    let response = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message})
    });

    let data = await response.json();

    document.getElementById("chat-box").innerHTML +=
        `<div class='message bot'>Bot: ${data.reply}</div>`;

    input.value = "";
}
</script>

</body>
</html>
